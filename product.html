<!DOCTYPE html>
<html>
<head>
    <title>Kape Ni Marc</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<center>
    <nav>
        <a href="index.html">HOME</a>
        <a href="product.html">PRODUCT</a>
        <a href="about.html">ABOUT US</a>
        <a href="contact.html">CONTACT US</a>
        <a href="music.html">MUSIC</a>
    </nav>
    <h1 class="product-title">OUR BEST SELLERS</h1>
</center>

<div class="product-grid">

    <div class="card">
        <img src="images/cappuccino.jpg" width="100%">
        <h3>Hot Cappuccino</h3>
        <p>
            <b>₱120.00</b>
            <button class="order-btn" data-name="Hot Cappuccino" data-price="120">ORDER</button>
        </p>
    </div>

    <div class="card">
        <img src="images/latte.jpg" width="100%">
        <h3>Hot Latte</h3>
        <p>
            <b>₱130.00</b>
            <button class="order-btn" data-name="Hot Latte" data-price="130">ORDER</button>
        </p>
    </div>

    <div class="card">
        <img src="images/mocha.jpg" width="100%">
        <h3>Iced Mocha</h3>
        <p>
            <b>₱150.00</b>
            <button class="order-btn" data-name="Iced Mocha" data-price="150">ORDER</button>
        </p>
    </div>

    <div class="card">
        <img src="images/dalgona.jpg" width="100%">
        <h3>Iced Dalgona</h3>
        <p>
            <b>₱170.00</b>
            <button class="order-btn" data-name="Iced Dalgona" data-price="170">ORDER</button>
        </p>
    </div>

    <div class="card">
        <img src="images/combo.jpg" width="100%">
        <h3>Barkada Combo</h3>
        <p>
            <b>₱169.00</b>
            <button class="order-btn" data-name="Barkada Combo" data-price="169">ORDER</button>
        </p>
    </div>

</div>

<!-- POPUP -->
<div class="order-popup" id="popup">
    <div class="popup-box">
        <h2>🛒 Order</h2>

        <p>Product: <span id="product-name"></span></p>
        <p>Price: ₱<span id="product-price"></span></p>

        <p>Quantity:</p>
        <div class="qty">
            <button id="minus">-</button>
            <span id="qty">1</span>
            <button id="plus">+</button>
        </div>

        <p><b>Total Price: ₱<span id="total">0</span></b></p>

        <button id="confirm">Confirm Order</button>
        <button id="cancel">Cancel</button>

        <p id="success-msg">
            ✅ Order Placed! <br>
            Thank you for ordering at Kape ni Marc ☕
        </p>
    </div>
</div>

<!-- ✅ GLOBAL AUDIO (required) -->
<audio id="globalAudio"></audio>

<!-- ✅ SCRIPT LAST -->
<script src="script.js"></script>

</body>
</html>
